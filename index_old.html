// ─── Briefing Modal ───
function BriefingModal({ onClose }) {
  const [submitted, setSubmitted] = useState(false);
  const [formData, setFormData] = useState({ name: "", email: "", company: "", interest: "" });
  const [submitting, setSubmitting] = useState(false);

  const handleChange = (e) => {
    setFormData({ ...formData, [e.target.name]: e.target.value });
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!formData.name || !formData.email) return;
    setSubmitting(true);
    try {
      const body = new URLSearchParams({
        "form-name": "briefing",
        ...formData
      });
      await fetch("/", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString()
      });
    } catch (err) {
      // Still show success — Netlify may not be available in dev
    }
    setSubmitting(false);
    setSubmitted(true);
  };

  return (
    <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal-card">
        <button className="modal-close" onClick={onClose}>×</button>
        {!submitted ? (
          <>
            <div className="modal-title">Schedule a Briefing</div>
            <div className="modal-sub">A 30-minute conversation to evaluate where AI can drive measurable impact in your organization. No obligations.</div>
            <form name="briefing" onSubmit={handleSubmit} data-netlify="true" netlify-honeypot="bot-field">
              <input type="hidden" name="form-name" value="briefing" />
              <p style={{ display: "none" }}><input name="bot-field" /></p>
              <div className="form-group">
                <label className="form-label">Full Name</label>
                <input className="form-input" name="name" value={formData.name} onChange={handleChange} placeholder="John Smith" required />
              </div>
              <div className="form-group">
                <label className="form-label">Work Email</label>
                <input className="form-input" name="email" type="email" value={formData.email} onChange={handleChange} placeholder="john@company.com" required />
              </div>
              <div className="form-group">
                <label className="form-label">Company</label>
                <input className="form-input" name="company" value={formData.company} onChange={handleChange} placeholder="Acme Corp" />
              </div>
              <div className="form-group">
                <label className="form-label">Area of Interest</label>
                <select className="form-select" name="interest" value={formData.interest} onChange={handleChange}>
                  <option value="">Select a domain...</option>
                  <option>Healthcare</option>
                  <option>Audit & CPA Firms</option>
                  <option>Talent Acquisition</option>
                  <option>Go-to-Market / Sales</option>
                  <option>CFO Office / Finance</option>
                  <option>Other / Not Sure Yet</option>
                </select>
              </div>
              <button className="form-submit" type="submit" disabled={submitting}>
                {submitting ? "Submitting..." : "Submit Request →"}
              </button>
            </form>
          </>
        ) : (
          <div className="form-success">
            <span className="form-success-icon">✓</span>
            <div className="form-success-title">Request Received</div>
            <div className="form-success-text">Thank you. A member of our team will reach out within 24 hours to schedule your briefing.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Footer Component ───
function SiteFooter({ onOpenBriefing }) {
  return (
    <div className="page-footer">
      <div className="container">
        <button className="footer-cta" onClick={onOpenBriefing}>Schedule a Briefing →</button>
        <p className="footer-text">A 30-minute conversation to evaluate where AI can drive measurable impact in your organization. No obligations.</p>
        <div className="footer-brand">
          <span className="footer-logo-mark">m</span>
          <span className="footer-copy">© 2026 mirai labs. All rights reserved.</span>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ───
function App() {
  const [page, setPage] = useState(PAGES.HOME);
  const [selectedIndustry, setSelectedIndustry] = useState(null);
  const [showBriefing, setShowBriefing] = useState(false);

  const navigate = (target, industryId = null) => {
    setPage(target);
    setSelectedIndustry(industryId);
    setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);
  };

  const openBriefing = () => setShowBriefing(true);

  return (
    <div>
      <style>{css}</style>

      {/* Navbar */}
      <div className="navbar">
        <div className="nav-logo" onClick={() => navigate(PAGES.HOME)}>
          <span className="nav-logo-mark">m</span>
          mirai labs
        </div>
        <div className="nav-links">
          <span className={`nav-link ${page === PAGES.HOME ? "active" : ""}`} onClick={() => navigate(PAGES.HOME)}>Home</span>
          <span className={`nav-link ${page === PAGES.USE_CASES || page === PAGES.DETAIL ? "active" : ""}`} onClick={() => navigate(PAGES.USE_CASES)}>Use Cases</span>
          <button className="nav-cta" onClick={openBriefing}>Schedule a Briefing</button>
        </div>
      </div>

      {/* Pages */}
      {page === PAGES.HOME && <HomePage onNavigate={navigate} onOpenBriefing={openBriefing} />}
      {page === PAGES.USE_CASES && <MasterPage onSelectIndustry={(id) => navigate(PAGES.DETAIL, id)} onOpenBriefing={openBriefing} />}
      {page === PAGES.DETAIL && selectedIndustry === "healthcare" && <HealthcarePage onBack={() => navigate(PAGES.USE_CASES)} onOpenBriefing={openBriefing} />}
      {page === PAGES.DETAIL && selectedIndustry === "audit" && <AuditPage onBack={() => navigate(PAGES.USE_CASES)} onOpenBriefing={openBriefing} />}
      {page === PAGES.DETAIL && selectedIndustry === "talent" && <TalentPage onBack={() => navigate(PAGES.USE_CASES)} onOpenBriefing={openBriefing} />}
      {page === PAGES.DETAIL && selectedIndustry === "gtm" && <GTMPage onBack={() => navigate(PAGES.USE_CASES)} onOpenBriefing={openBriefing} />}
      {page === PAGES.DETAIL && selectedIndustry === "cfo" && <CFOPage onBack={() => navigate(PAGES.USE_CASES)} onOpenBriefing={openBriefing} />}

      {/* Briefing Modal */}
      {showBriefing && <BriefingModal onClose={() => setShowBriefing(false)} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
